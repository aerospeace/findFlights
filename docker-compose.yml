version: "3.9"

services:
  findflights:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: "5000"
      FLASK_DEBUG: "1"
      SQLITE_DB_PATH: /data/findflights.db
      CACHE_DAYS: "1"
      SECRET_KEY: change-me-in-prod
    volumes:
      - findflights_data:/data

volumes:
  findflights_data:
